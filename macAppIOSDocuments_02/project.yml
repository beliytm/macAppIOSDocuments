name: MyIOSAppEnglish
options:
  bundleIdPrefix: com.beliytm
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MyIOSAppEnglish:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App.swift
      - path: ContentView.swift
      - path: AppCore
      - path: AppModules
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beliytm.MyIOSAppEnglish
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: MyIOSAppEnglish
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Микрофон нужен для распознавания речи"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Распознавание речи используется для перевода аудио"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - framework: PDFKit.framework
        embed: false
      - framework: Speech.framework
        embed: false
      - framework: AVFoundation.framework
        embed: false
